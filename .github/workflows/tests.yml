name: Tests

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short

      - name: Smoke-test the CLI
        run: |
          dummyindex --help
          dummyindex --version
          # Project-scope install + ingest on the repo itself.
          dummyindex install --scope project --dir .
          dummyindex ingest .
          test -f .context/INDEX.md
          test -f .context/tree.json
          test -f .context/map/symbols.json
          test -f .claude/CLAUDE.md
          test ! -f CLAUDE.md  # legacy location must not be written
          dummyindex context enrich-plan .
          test -f .context/_enrich_plan.json
