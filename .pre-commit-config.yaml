# Pre-commit hooks for dummyindex — ruff is the single linter + formatter.
# Install once with:  pre-commit install
# Run on everything:  pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: \.json$
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint (auto-fixable issues fixed in place). Config lives in pyproject.toml
      # [tool.ruff.lint]; the same `ruff check` runs in the Lint CI workflow.
      - id: ruff
        args: [--fix]
      # Format staged files. CI does not enforce formatting yet — run
      # `ruff format` once to normalise the tree before relying on this.
      - id: ruff-format
